services:
  - type: web
    name: vms-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: |
      mkdir -p /opt/render/project/src/data/uploads /opt/render/project/src/data/cache
      uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: UPLOAD_DIR
        value: /opt/render/project/src/data/uploads
      - key: CEIPAL_CACHE_DIR
        value: /opt/render/project/src/data/cache
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/vms.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
